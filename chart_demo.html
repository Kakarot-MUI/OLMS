<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Preview Demo - OLMS</title>
    <!-- Bootstrap CSS for Dark Mode -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .sidebar {
            height: 100vh;
            background-color: #1a1a1a;
            border-right: 1px solid #333;
            padding-top: 20px;
        }
        .dashboard-container {
            padding: 30px;
        }
        .chart-card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #333;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Mock Sidebar -->
            <div class="col-md-2 sidebar d-none d-md-block">
                <h4 class="text-center text-primary mb-4 fw-bold">OLMS Analytics</h4>
                <ul class="nav flex-column ps-3">
                    <li class="nav-item mb-2"><a href="#" class="nav-link text-white">🏠 Home</a></li>
                    <li class="nav-item mb-2"><a href="#" class="nav-link text-info">📊 Analytics</a></li>
                    <li class="nav-item mb-2"><a href="#" class="nav-link text-white">📚 Books</a></li>
                </ul>
            </div>

            <!-- Main Dashboard Area -->
            <div class="col-md-10 dashboard-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Library Statistics Preview</h2>
                    <span class="badge bg-warning text-dark">Isolated Sandbox Mode (Fake Data)</span>
                </div>

                <!-- Top Stats -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="stat-card shadow">
                            <h5 class="opacity-75">Total Books Issued</h5>
                            <h2 class="fw-bold mb-0">1,245</h2>
                        </div>
                    </div>
                </div>

                <!-- Charts Row -->
                <div class="row">
                    <!-- Line Chart -->
                    <div class="col-md-8">
                        <div class="chart-card">
                            <h5 class="mb-3 text-primary">Library Traffic (Borrows By Month)</h5>
                            <canvas id="trafficChart" height="100"></canvas>
                        </div>
                    </div>
                    
                    <!-- Bar Chart -->
                    <div class="col-md-4">
                        <div class="chart-card">
                            <h5 class="mb-3 text-info">Most Demanded Books</h5>
                            <canvas id="popularChart" height="220"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js Logic -->
    <script>
        // 1. Line Chart (Traffic)
        const ctxLine = document.getElementById('trafficChart').getContext('2d');
        new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
                datasets: [{
                    label: 'Total Books Issued',
                    data: [65, 59, 120, 81, 150, 45, 180], // FAKE DATA
                    borderColor: '#4f46e5',
                    backgroundColor: 'rgba(79, 70, 229, 0.2)',
                    borderWidth: 3,
                    tension: 0.4, // Makes the line curvy!
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { grid: { color: '#333' } },
                    x: { grid: { display: false } }
                }
            }
        });

        // 2. Bar Chart (Popular Books)
        const ctxBar = document.getElementById('popularChart').getContext('2d');
        new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: ['Python Pro', 'Deep Learning', 'Harry Potter', 'Data Science'],
                datasets: [{
                    label: 'Times Borrowed',
                    data: [45, 38, 25, 18], // FAKE DATA
                    backgroundColor: ['#7c3aed', '#4f46e5', '#0ea5e9', '#10b981'],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { grid: { color: '#333' } },
                    x: { grid: { display: false } }
                }
            }
        });
    </script>
</body>
</html>
