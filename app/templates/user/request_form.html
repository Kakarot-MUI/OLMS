{% extends "user/layout.html" %}

{% block title %}Request a Book{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('user.my_requests') }}" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i> Back
            </a>
            <div>
                <h1 class="h3 fw-700 mb-0">Request a New Book</h1>
                <p class="text-muted mb-0">Suggest a book for the library to purchase.</p>
            </div>
        </div>

        <div class="card card-olms border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
                <form method="POST" action="{{ url_for('user.request_book') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-4">
                        <label for="title" class="form-label fw-bold">Book Title <span
                                class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg bg-light border-0" id="title"
                            name="title" required placeholder="e.g. The Clean Coder">
                    </div>

                    <div class="mb-4">
                        <label for="author" class="form-label fw-bold">Author <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg bg-light border-0" id="author"
                            name="author" required placeholder="e.g. Robert C. Martin">
                    </div>

                    <div class="mb-4">
                        <label for="reason" class="form-label fw-bold">Why should we buy this? <span
                                class="text-muted fw-normal">(Optional)</span></label>
                        <textarea class="form-control bg-light border-0" id="reason" name="reason" rows="4"
                            placeholder="e.g. It's highly recommended for our software engineering course..."></textarea>
                    </div>

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold" style="letter-spacing: 0.5px;">
                            <i class="bi bi-send-fill me-2"></i> Submit Request
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
