{% extends "base.html" %}

{% block body %}
{# ── Top Navbar ──────────────────────────────────────────────── #}
<nav class="navbar navbar-expand-lg navbar-olms">
    <div class="container">
        <!-- Toggler on the left (Mobile) -->
        <button class="navbar-toggler me-2 border-0 px-1" type="button" data-bs-toggle="offcanvas"
            data-bs-target="#userOffcanvas" aria-controls="userOffcanvas" style="color:#fff;">
            <i class="bi bi-list" style="font-size:1.5rem;"></i>
        </button>

        <!-- Brand -->
        <a class="navbar-brand me-auto" href="{{ url_for('user.dashboard') }}">
            <i class="bi bi-book-half"></i>Smart Library
        </a>

        <!-- Offcanvas Navigation (Slides from Left) -->
        <div class="offcanvas offcanvas-start" tabindex="-1" id="userOffcanvas" aria-labelledby="userOffcanvasLabel"
            style="background-color: var(--bg-card); color: var(--text-primary);">
            <div class="offcanvas-header border-bottom" style="border-color: var(--border-color) !important;">
                <h5 class="offcanvas-title" id="userOffcanvasLabel" style="color: var(--text-primary);">
                    <i class="bi bi-book-half me-2"></i>Smart Library
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('user.dashboard') }}"><i
                                class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('user.search') }}"><i class="bi bi-search me-1"></i>Browse
                            Books</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('user.my_books') }}"><i
                                class="bi bi-journal-check me-1"></i>My
                            Books</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('user.history') }}"><i
                                class="bi bi-clock-history me-1"></i>History</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('user.chat') }}"><i
                                class="bi bi-chat-dots me-1"></i>Chat</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('user.profile') }}"><i
                                class="bi bi-person-circle me-1"></i>Profile</a>
                    </li>
                    <!-- Theme Toggle -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="themeDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-moon-stars me-1"></i>Theme
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="themeDropdown"
                            style="font-size: 0.9rem;">
                            <li><button class="dropdown-item theme-btn" data-theme-value="light"><i
                                        class="bi bi-sun me-2"></i>Light</button></li>
                            <li><button class="dropdown-item theme-btn" data-theme-value="dark"><i
                                        class="bi bi-moon me-2"></i>Dark</button></li>
                        </ul>
                    </li>
                    <!-- /Theme Toggle -->
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('auth.logout') }}"><i
                                class="bi bi-box-arrow-left me-1"></i>Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="content-wrapper">
    {% block content %}{% endblock %}
</div>
{% endblock %}
